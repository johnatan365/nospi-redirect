<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nospi — Redirigiendo...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #6B21A8, #9333EA);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 800; color: #6B21A8; margin-bottom: 8px; }
    p { font-size: 15px; color: #666; margin-bottom: 28px; }
    .btn {
      display: block;
      background: #6B21A8;
      color: white;
      font-size: 17px;
      font-weight: 700;
      padding: 18px 24px;
      border-radius: 14px;
      text-decoration: none;
      width: 100%;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Redirigiendo...</h1>
    <p id="msg">Volviendo a Nospi</p>
    <button id="btn" class="btn" style="display:none">Volver a Nospi</button>
  </div>
  <script>
    // Wompi envía estos parámetros en la URL de retorno:
    // ?id=xxx&transaction_id=xxx&collection_status=approved&status=approved
    var params = new URLSearchParams(window.location.search);
    
    // Capturar transactionId — Wompi lo manda como 'id' o 'transaction_id'
    var transactionId = params.get('id') || params.get('transaction_id') || '';
    
    // Capturar status
    var collectionStatus = params.get('collection_status') || params.get('status') || '';
    var path = window.location.pathname;
    
    var paymentStatus = 'success';
    if (collectionStatus === 'rejected' || collectionStatus === 'cancelled' || 
        collectionStatus === 'declined' || path.includes('failure')) {
      paymentStatus = 'failure';
      document.getElementById('icon').textContent = '❌';
      document.getElementById('title').textContent = 'Pago no completado';
      document.getElementById('msg').textContent = 'No se pudo procesar el pago.';
    } else if (collectionStatus === 'pending' || collectionStatus === 'in_process' || path.includes('pending')) {
      paymentStatus = 'pending';
      document.getElementById('icon').textContent = '⏳';
      document.getElementById('title').textContent = 'Pago en proceso';
      document.getElementById('msg').textContent = 'Tu pago está siendo procesado.';
    } else {
      document.getElementById('icon').textContent = '✅';
      document.getElementById('title').textContent = '¡Pago exitoso!';
      document.getElementById('msg').textContent = 'Volviendo a Nospi...';
    }

    // Construir URL de regreso con transactionId
    var returnUrl = 'https://nospi.vercel.app/subscription-plans?payment_status=' + paymentStatus;
    if (transactionId) {
      returnUrl += '&transaction_id=' + transactionId;
    }

    document.getElementById('btn').href = returnUrl;
    document.getElementById('btn').style.display = 'block';
    document.getElementById('btn').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = returnUrl;
    });

    // Auto-redirect después de 800ms
    setTimeout(function() {
      window.location.href = returnUrl;
    }, 800);
  </script>
</body>
</html>
