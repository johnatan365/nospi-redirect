<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nospi — Pago</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #6B21A8, #9333EA);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 800; color: #6B21A8; margin-bottom: 8px; }
    p { font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 28px; }
    .btn {
      display: block;
      background: #6B21A8;
      color: white;
      font-size: 17px;
      font-weight: 700;
      padding: 18px 24px;
      border-radius: 14px;
      text-decoration: none;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .btn:active { background: #581C87; }
    .hint { font-size: 12px; color: #aaa; margin-top: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">✅</div>
    <h1 id="title">¡Pago exitoso!</h1>
    <p id="msg">Tu asistencia al evento ha sido confirmada.</p>
    <a id="btn" href="#" class="btn">Volver a Nospi</a>
    <p class="hint">Toca el botón para volver a la app</p>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var status = params.get('collection_status') || params.get('status') || 'approved';
    var path = window.location.pathname;

    var paymentStatus = 'success';
    if (status === 'rejected' || status === 'cancelled' || path.includes('failure')) {
      document.getElementById('icon').textContent = '❌';
      document.getElementById('title').textContent = 'Pago no completado';
      document.getElementById('msg').textContent = 'No se pudo procesar el pago. Vuelve a Nospi e intenta de nuevo.';
      paymentStatus = 'failure';
    } else if (status === 'pending' || status === 'in_process' || path.includes('pending')) {
      document.getElementById('icon').textContent = '⏳';
      document.getElementById('title').textContent = 'Pago en proceso';
      document.getElementById('msg').textContent = 'Tu pago está siendo procesado. Te avisaremos cuando se confirme.';
      paymentStatus = 'pending';
    }

    var webUrl = 'https://nospi.vercel.app/subscription-plans?payment_status=' + paymentStatus;
    var nativeUrl = 'nospi://payment/' + paymentStatus;

    document.getElementById('btn').addEventListener('click', function(e) {
      e.preventDefault();
      // Try native deep link first, fallback to web after 1s
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = nativeUrl;
      document.body.appendChild(iframe);
      setTimeout(function() {
        try { document.body.removeChild(iframe); } catch(e) {}
        window.location.href = webUrl;
      }, 1000);
    });

    // Auto-redirect to web after 2.5s
    setTimeout(function() {
      window.location.href = webUrl;
    }, 2500);
  </script>
</body>
</html>
